<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعاء كميل - شاشة كاملة</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #d4af37; 
            font-family: Arial, sans-serif; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; 
        }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        #start-btn { 
            padding: 30px 80px; font-size: 3rem; background: #1a4d2e; color: white; 
            border: 3px solid #d4af37; border-radius: 20px; cursor: pointer; outline: none; 
            transition: 0.2s; 
        }
        #start-btn:focus, #start-btn.active-focus { 
            background: #2d824d; box-shadow: 0 0 40px #d4af37; transform: scale(1.1); 
        }
        #display-panel { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            text-align: center; padding: 20px; 
        }
        #lyrics-text { 
            font-size: 5rem; font-weight: bold; line-height: 1.5; transition: opacity 0.2s; 
        }
        #controls { 
            background: #111; padding: 20px; display: flex; justify-content: center; 
            border-top: 2px solid #333; 
        }
        audio { width: 90%; height: 60px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #d4af37; font-size: 4rem; margin-bottom: 50px;">دعاء كُميل بن زياد</h1>
    <button id="start-btn" tabindex="0">بدء الدعاء (OK)</button>
    <p style="color: #888; font-size: 1.5rem; margin-top: 20px;">اضغط OK للتشغيل بوضع الشاشة الكاملة</p>
</div>

<div id="display-panel">
    <div id="lyrics-text">جاري التحميل...</div>
</div>

<div id="controls">
    <audio id="audio-player" controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    // أستاذ ثائر: انسخ مصفوفة التوقيتات من ملفك الأصلي وضعها هنا
    // تحذير: استخدم var فقط، ولا تستخدم const أو let أبداً لتجنب الشاشة البيضاء
    var lyricsArray = [
        { start: 0, end: 5, text: "بِسْمِ اللَّهِ الرَّحْمَـٰنِ الرَّحِيمِ" },
        { start: 5, end: 12, text: "اللّهمَّ صلِّ على محمَّد وآل محمَّد" }
        // ... الصق بقية الأسطر هنا
    ];

    var audio = document.getElementById('audio-player');
    var textDiv = document.getElementById('lyrics-text');
    var startBtn = document.getElementById('start-btn');
    var overlay = document.getElementById('overlay');
    var isStarted = false;

    // دالة تفعيل الشاشة الكاملة (متوافقة مع متصفحات التلفزيون القديمة)
    function openFullscreen() {
        var elem = document.documentElement;
        if (elem.requestFullscreen) { 
            elem.requestFullscreen(); 
        } else if (elem.webkitRequestFullscreen) { 
            elem.webkitRequestFullscreen(); // Safari / Chrome / LG webOS
        } else if (elem.mozRequestFullScreen) { 
            elem.mozRequestFullScreen(); 
        } else if (elem.msRequestFullscreen) { 
            elem.msRequestFullscreen(); 
        }
    }

    // دالة بدء التشغيل
    function startApp() {
        if (isStarted) return;
        isStarted = true;
        
        openFullscreen(); // تفعيل وضع الشاشة الكاملة أولاً
        overlay.style.display = 'none'; // إخفاء واجهة البدء
        audio.play(); // تشغيل الصوت
    }

    // لقط ضغطة الماوس
    startBtn.onclick = startApp;

    // لقط ضغطة زر OK من الريموت (زر رقم 13)
    document.addEventListener('keydown', function(event) {
        if (event.keyCode === 13) {
            startApp();
        }
    });

    // تحديث النص مع الصوت
    audio.ontimeupdate = function() {
        var currentTime = audio.currentTime;
        var activeText = "";

        for (var i = 0; i < lyricsArray.length; i++) {
            if (currentTime >= lyricsArray[i].start && currentTime <= lyricsArray[i].end) {
                activeText = lyricsArray[i].text;
                break;
            }
        }

        if (activeText !== "" && textDiv.innerText !== activeText) {
            textDiv.style.opacity = 0;
            setTimeout(function() {
                textDiv.innerText = activeText;
                textDiv.style.opacity = 1;
            }, 100);
        }
    };

    // إعطاء التركيز للزر عند فتح الصفحة
    window.onload = function() {
        startBtn.focus();
        startBtn.classList.add('active-focus');
    };
</script>

</body>
</html>
