<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعاء كميل - شاشة LG</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000000; color: #d4af37;
            font-family: 'Arial', sans-serif; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #display-panel {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #lyrics-text {
            font-size: 5rem; font-weight: bold; line-height: 1.4;
            text-shadow: 0px 4px 10px rgba(212, 175, 55, 0.3); transition: opacity 0.3s;
        }
        #controls-container {
            background: #111; padding: 20px; border-top: 2px solid #333; display: flex; justify-content: center;
        }
        audio { width: 90%; height: 50px; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #start-button {
            padding: 25px 60px; font-size: 2.5rem; background: #1a4d2e; color: white;
            border: 2px solid #d4af37; border-radius: 15px; cursor: pointer;
            outline: none;
        }
        /* تأثير واضح جداً لما تحدد الزر بالريموت */
        #start-button:focus, #start-button.active-focus { 
            background: #2d824d; 
            box-shadow: 0 0 30px #d4af37; 
            transform: scale(1.1);
            transition: all 0.2s;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #d4af37; font-size: 3.5rem; margin-bottom: 40px;">دعاء كُميل بن زياد</h1>
    <button id="start-button" tabindex="0">تشغيل (OK)</button>
    <p style="color: #666; font-size: 1.5rem; margin-top: 20px;">اضغط زر OK في الريموت كونترول</p>
</div>

<div id="display-panel">
    <div id="lyrics-text">جاري التحميل...</div>
</div>

<div id="controls-container">
    <audio id="audio-player" controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    // 1. ضع كل النص الأصلي (SRT) هنا بالضبط كما هو في ملفك الأصلي
    var srtContent = `
1
00:00:00,000 --> 00:00:08,000
بِسْمِ اللَّهِ الرَّحْمَـٰنِ الرَّحِيمِ

2
00:00:08,500 --> 00:00:18,110
اللّهمَّ صلِّ على محمَّد وآل محمَّد

`;

    // 2. دالة تحويل الوقت إلى ثواني
    function toSec(t) {
        var a = t.split(':'); 
        var s = a[2].split(',');
        return (Number(a[0]) * 3600) + (Number(a[1]) * 60) + Number(s[0]) + (Number(s[1]) / 1000);
    }

    // 3. تحويل نص الـ SRT إلى مصفوفة بيانات
    var cleanedSrt = srtContent.replace(/\r\n/g, '\n');
    var lines = cleanedSrt.trim().split('\n\n');
    var lyricsArray = [];
    
    for(var i = 0; i < lines.length; i++) {
        var block = lines[i];
        if(!block) continue;
        var parts = block.split('\n');
        
        if(parts.length >= 3) {
            var timeParts = parts[1].split(' --> ');
            if(timeParts.length === 2) {
                var textParts = [];
                for(var j = 2; j < parts.length; j++) {
                    textParts.push(parts[j]);
                }
                lyricsArray.push({
                    start: toSec(timeParts[0]),
                    end: toSec(timeParts[1]),
                    text: textParts.join(' ')
                });
            }
        }
    }

    // 4. التحكم بالصوت والنصوص
    var audio = document.getElementById('audio-player');
    var textDiv = document.getElementById('lyrics-text');
    var startBtn = document.getElementById('start-button');
    var overlay = document.getElementById('overlay');
    var isStarted = false;

    if (lyricsArray.length > 0) {
        textDiv.innerText = lyricsArray[0].text;
    }

    // دالة التشغيل الرئيسية
    function startApp() {
        if (isStarted) return;
        isStarted = true;
        overlay.style.display = 'none';
        audio.play();
    }

    // لقط ضغطة الماوس أو الماجيك ريموت
    startBtn.addEventListener('click', startApp);

    // لقط ضغطة زر OK أو Enter من الريموت العادي
    document.addEventListener('keydown', function(event) {
        // رقم 13 هو كود زر OK / Enter في ريموت شاشات LG
        if (event.keyCode === 13) {
            startApp();
        }
    });

    audio.ontimeupdate = function() {
        var currentTime = audio.currentTime;
        var activeText = "";

        for (var i = 0; i < lyricsArray.length; i++) {
            if (currentTime >= lyricsArray[i].start && currentTime <= lyricsArray[i].end) {
                activeText = lyricsArray[i].text;
                break;
            }
        }

        if (activeText !== "" && textDiv.innerText !== activeText) {
            textDiv.style.opacity = 0;
            setTimeout(function() {
                textDiv.innerText = activeText;
                textDiv.style.opacity = 1;
            }, 150);
        }
    };

    // إجبار المتصفح يخلي الزر مفعل (Focus) أول ما تفتح الصفحة
    window.onload = function() {
        startBtn.focus();
        startBtn.classList.add('active-focus');
    };
</script>

</body>
</html>
