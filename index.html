<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعاء كميل - شاشة كاملة</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #d4af37; 
            font-family: Arial, sans-serif; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; 
        }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        #start-btn { 
            padding: 30px 80px; font-size: 3rem; background: #1a4d2e; color: white; 
            border: 3px solid #d4af37; border-radius: 20px; cursor: pointer; outline: none; 
            transition: 0.2s; 
        }
        #start-btn:focus, #start-btn.active-focus { 
            background: #2d824d; box-shadow: 0 0 40px #d4af37; transform: scale(1.1); 
        }
        #display-panel { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            text-align: center; padding: 20px; 
        }
        /* الخط كبرته جداً حتى الكلمة تبين واضحة بنص الشاشة */
        #lyrics-text { 
            font-size: 8rem; font-weight: bold; line-height: 1.5;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        #controls { 
            background: #111; padding: 20px; display: flex; justify-content: center; 
            border-top: 2px solid #333; 
        }
        audio { width: 90%; height: 60px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #d4af37; font-size: 4rem; margin-bottom: 50px;">دعاء كُميل بن زياد</h1>
    <button id="start-btn" tabindex="0">بدء الدعاء (OK)</button>
    <p style="color: #888; font-size: 1.5rem; margin-top: 20px;">اضغط OK للتشغيل بوضع الشاشة الكاملة</p>
</div>

<div id="display-panel">
    <div id="lyrics-text">جاري التحميل...</div>
</div>

<div id="controls">
    <audio id="audio-player" controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
</div>

<textarea id="srt-data" style="display:none;">
1
00:00:00,000 --> 00:00:08,000
بِسْمِ اللَّهِ الرَّحْمَـٰنِ الرَّحِيمِ

2
00:00:08,500 --> 00:00:18,110
اللّهمَّ صلِّ على محمَّد وآل محمَّد

11
00:00:18,560 --> 00:00:19,970
اللّهمَّ

12
00:00:19,970 --> 00:00:20,750
إنّي

13
00:00:20,750 --> 00:00:21,730
أَسأَلك

</textarea>

<script>
    // دالة تحويل الوقت إلى ثواني
    function toSec(timeString) {
        var a = timeString.split(':'); 
        var s = a[2].split(',');
        return (Number(a[0]) * 3600) + (Number(a[1]) * 60) + Number(s[0]) + (Number(s[1]) / 1000);
    }

    // سحب البيانات من الحقل المخفي وتجهيزها
    var rawText = document.getElementById('srt-data').value;
    var cleanedSrt = rawText.replace(/\r\n/g, '\n');
    var blocks = cleanedSrt.split(/\n\s*\n/); // تقسيم النص عند كل سطر فارغ
    var lyricsArray = [];
    
    // المترجم (Parser) لتحويل النص إلى مصفوفة يفهمها التلفزيون
    for(var i = 0; i < blocks.length; i++) {
        var block = blocks[i].trim();
        if(!block) continue;
        
        var parts = block.split('\n');
        if(parts.length >= 3) {
            var timeParts = parts[1].split(' --> ');
            if(timeParts.length === 2) {
                var textParts = [];
                for(var j = 2; j < parts.length; j++) {
                    textParts.push(parts[j].trim());
                }
                lyricsArray.push({
                    start: toSec(timeParts[0].trim()),
                    end: toSec(timeParts[1].trim()),
                    text: textParts.join(' ')
                });
            }
        }
    }

    // التشغيل والتحكم
    var audio = document.getElementById('audio-player');
    var textDiv = document.getElementById('lyrics-text');
    var startBtn = document.getElementById('start-btn');
    var overlay = document.getElementById('overlay');
    var isStarted = false;

    function openFullscreen() {
        var elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen(); } 
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
    }

    function startApp() {
        if (isStarted) return;
        isStarted = true;
        openFullscreen();
        overlay.style.display = 'none';
        audio.play();
    }

    startBtn.onclick = startApp;

    document.addEventListener('keydown', function(event) {
        if (event.keyCode === 13) { startApp(); }
    });

    // مزامنة النص مع الصوت 
    // لغيت تأثير الاختفاء البطيء حتى الكلمات السريعة تظهر مباشرة بدون تقطيع
    audio.ontimeupdate = function() {
        var currentTime = audio.currentTime;
        var activeText = "";

        for (var i = 0; i < lyricsArray.length; i++) {
            if (currentTime >= lyricsArray[i].start && currentTime <= lyricsArray[i].end) {
                activeText = lyricsArray[i].text;
                break;
            }
        }

        // تحديث النص فوراً 
        if (activeText !== "" && textDiv.innerText !== activeText) {
            textDiv.innerText = activeText;
        }
    };

    window.onload = function() {
        startBtn.focus();
        startBtn.classList.add('active-focus');
    };
</script>

</body>
</html>
